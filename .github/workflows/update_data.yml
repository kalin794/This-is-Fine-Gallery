name: Daily Exhibition Data Update

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Pull latest changes
        run: git pull --rebase

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch exhibition data
        env:
          SERVICE_KEY: ${{ secrets.SERVICE_KEY }}
        run: python scripts/fetch_exhibitions.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/exhibitions.json
          git diff --staged --quiet || git commit -m "chore: 전시 데이터 자동 갱신 $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M KST')"
          git push
