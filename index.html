<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>전시 안내 아카이브</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root { --bg: #0e0d0b; --bg-card: #161510; --border: #2a2820; --gold: #c9a84c; --text: #e8e2d5; --text-muted: #888; }
    body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 0; }
    header { border-bottom: 1px solid var(--border); padding: 0 32px; background: rgba(14,13,11,0.95); position: sticky; top: 0; z-index: 100; }
    .header-inner { display: flex; align-items: center; justify-content: space-between; height: 80px; transition: 0.3s; }
    .logo { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--gold); font-weight: 700; width: 200px; }
    .filter-group { display: flex; align-items: center; gap: 10px; }
    .date-input-wrap { position: relative; display: flex; align-items: center; background: var(--bg-card); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; }
    .date-text { background: transparent; border: none; color: var(--text); font-size: 0.85rem; width: 121px; outline: none; padding: 5px 0; }
    .gray-icon { font-size: 1rem; filter: grayscale(100%) brightness(0.8) contrast(0.5); opacity: 0.7; display: inline-block; vertical-align: middle; margin-right: 4px; }
    .date-picker { position: absolute; right: 5px; width: 24px; height: 24px; opacity: 0; cursor: pointer; }
    .filter-btn { background: var(--gold); color: #000; border: none; padding: 7px 18px; border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 0.85rem; transition: 0.2s; }
    .filter-btn:hover { background: #e0bc6a; }
    .today-btn { background: #333; color: var(--text); border: 1px solid var(--border); }
    .status-bar { background: var(--gold); color: #000; font-size: 0.75rem; padding: 4px 32px; font-weight: 600; display: flex; justify-content: space-between; }
    .page-body { display: flex; max-width: 1600px; margin: 0 auto; min-height: calc(100vh - 104px); }
    .sidebar { width: 200px; border-right: 1px solid var(--gold); padding: 30px 20px; flex-shrink: 0; max-height: calc(100vh - 104px); overflow-y: auto; overflow-x: hidden; }
    .sidebar::-webkit-scrollbar { width: 8px; }
    .sidebar::-webkit-scrollbar-thumb { background: #3e3e42; border-radius: 4px; }
    .sidebar-title { font-size: 0.75rem; color: var(--gold); letter-spacing: 0.1em; margin-bottom: 15px; text-transform: uppercase; font-weight: 600; }
    .place-search-wrap { margin-bottom: 20px; }
    .place-search-input { width: 90%; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 6px 10px; color: var(--text); font-size: 0.75rem; outline: none; }
    .place-item { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-size: 0.8rem; color: #aaa; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .map-link { color: inherit; text-decoration: none; transition: 0.2s; }
    .map-link:hover { color: var(--gold); text-decoration: underline; }
    .content { flex: 1; padding: 30px 32px 80px; transition: 0.3s; }
    .card-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; transition: 0.2s; }
    .card:hover { border-color: var(--gold); transform: translateY(-3px); }
    .card-img { width: 100%; aspect-ratio: 16/10; object-fit: cover; background: #1a1814; cursor: pointer; }
    .card-body { padding: 16px; }
    .card-tag { font-size: 0.65rem; padding: 2px 6px; border-radius: 2px; margin-bottom: 8px; display: inline-block; font-weight: 600; }
    .tag-ongoing { background: rgba(90, 158, 120, 0.2); color: #5a9e78; border: 1px solid #5a9e78; }
    .tag-upcoming { background: rgba(201, 168, 76, 0.2); color: var(--gold); border: 1px solid var(--gold); }
    .card-title { font-size: 0.9rem; font-weight: 600; line-height: 1.4; height: 2.8em; overflow: hidden; margin-bottom: 10px; cursor: pointer; }
    .card-info { font-size: 0.75rem; color: #8a8070; margin-bottom: 4px; display: flex; align-items: center; gap: 4px; }
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .content { padding: 20px 16px; }
      .logo { width: auto; text-align: center; }
      .header-inner { flex-direction: column; height: auto; padding: 15px 0; gap: 15px; }
      .filter-group { width: 100%; justify-content: center; flex-wrap: wrap; }
      header { padding: 0 16px; }
    }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: var(--bg-card); width: 95%; max-width: 800px; max-height: 90vh; border: 1px solid var(--border); border-radius: 12px; overflow-y: auto; position: relative; }
    .modal-close { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.5); border: none; color: #fff; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; z-index: 10; }
    .modal-inner { padding: 30px; }
    .modal-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--gold); margin-bottom: 20px; }
    .modal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .info-item { border-left: 2px solid var(--gold); padding-left: 15px; }
    .modal-desc { line-height: 1.8; color: #aaa; font-size: 0.9rem; border-top: 1px solid var(--border); padding-top: 20px; }
    .pagination { display: flex; justify-content: center; align-items: center; gap: 6px; margin-top: 40px; padding-bottom: 40px; }
    .page-btn { background: var(--bg-card); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
    .page-btn.active { background: var(--gold); color: #000; font-weight: 700; border-color: var(--gold); }
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="logo">전시 안내</div>
    <div class="filter-group">
      <input type="text" id="keywordSearch" class="date-text" placeholder="제목/장소/내용 검색" style="width:160px;background:var(--bg-card);border:1px solid var(--border);border-radius:4px;padding:7px 10px;" onkeyup="if(event.keyCode==13)applyVisitFilter()">
      <div class="date-input-wrap">
        <input type="text" id="visitDateText" class="date-text" placeholder="방문일 yyyy.mm.dd" maxlength="10" onkeyup="if(window.event.keyCode==13){applyVisitFilter()}">
        <span class="gray-icon">📅</span>
        <input type="date" id="visitDatePicker" class="date-picker">
      </div>
      <button class="filter-btn today-btn" onclick="setToday()">Today</button>
      <button class="filter-btn" onclick="applyVisitFilter()">전시 찾기</button>
      <button class="filter-btn today-btn" onclick="resetAll()">초기화</button>
    </div>
  </div>
</header>
<div class="status-bar"><span id="loadInfo">데이터 연결 중...</span><span id="timerInfo"></span></div>
<div class="page-body">
  <aside class="sidebar" id="sidebar">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:15px;">
      <div class="sidebar-title" style="margin-bottom:0">Place Filter</div>
      <button onclick="resetPlaces()" style="background:none;border:1px solid var(--border);color:var(--text-muted);font-size:0.7rem;padding:2px 8px;border-radius:3px;cursor:pointer;">Reset</button>
    </div>
    <div class="place-search-wrap">
      <input type="text" id="placeSearch" class="place-search-input" placeholder="장소명 검색..." oninput="filterPlaceList()">
    </div>
    <div id="placeList"></div>
  </aside>
  <main class="content">
    <div class="card-grid" id="cardGrid"></div>
    <div id="pagination" class="pagination"></div>
  </main>
</div>
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this) closeModal()">
  <div class="modal-content" id="modalContent">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-inner">
      <div id="modalTitle" class="modal-title"></div>
      <img id="modalImg" style="width:100%;max-height:400px;object-fit:contain;margin-bottom:20px;border-radius:8px;" src="" alt="">
      <div class="modal-grid">
        <div class="info-item"><div class="info-label">Period</div><div id="modalPeriod" class="info-value"></div></div>
        <div class="info-item"><div class="info-label">Place</div><div id="modalSite" class="info-value"></div></div>
        <div class="info-item"><div class="info-label">Admission</div><div id="modalCharge" class="info-value"></div></div>
      </div>
      <div id="modalDesc" class="modal-desc"></div>
      <a id="modalUrl" style="display:inline-block; margin-top:20px; color:var(--gold);" href="#" target="_blank">사이트 방문 →</a>
    </div>
  </div>
</div>
<script>
const DATA_URL = 'data/exhibitions.json';
const TODAY = new Date().toISOString().slice(0, 10).replace(/-/g, '');
const DISPLAY_COUNT = 20;
let allExhibitions = [];
let displayData = [];
let selectedPlaces = new Set();
let currentPage = 1;

const getNaverMapLink = (site) => `https://map.naver.com/v5/search/${encodeURIComponent(site)}`;

function sanitizeHTML(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
function formatToDot(dateStr) {
  if (!dateStr) return '';
  const digits = dateStr.replace(/\D/g, '');
  if (digits.length === 8) return `${digits.slice(0, 4)}.${digits.slice(4, 6)}.${digits.slice(6, 8)}`;
  return dateStr.replace(/-/g, '.');
}
function setToday() {
  const vText = document.getElementById('visitDateText');
  const vPicker = document.getElementById('visitDatePicker');
  vText.value = formatToDot(TODAY);
  vPicker.value = `${TODAY.slice(0,4)}-${TODAY.slice(4,6)}-${TODAY.slice(6,8)}`;
  applyVisitFilter();
}
const vText = document.getElementById('visitDateText');
const vPicker = document.getElementById('visitDatePicker');
vText.addEventListener('input', (e) => {
  let val = e.target.value.replace(/\D/g, '');
  if (val.length > 8) val = val.slice(0, 8);
  let formatted = val;
  if (val.length > 4) formatted = val.slice(0, 4) + '.' + val.slice(4);
  if (val.length > 6) formatted = formatted.slice(0, 7) + '.' + formatted.slice(7);
  e.target.value = formatted;
  if (val.length === 8) vPicker.value = `${val.slice(0,4)}-${val.slice(4,6)}-${val.slice(6,8)}`;
});
vPicker.addEventListener('change', (e) => { vText.value = e.target.value.replace(/-/g, '.'); });

function filterPlaceList() {
  const query = document.getElementById('placeSearch').value.toLowerCase();
  document.querySelectorAll('.place-item').forEach(item => {
    item.style.display = item.textContent.toLowerCase().includes(query) ? 'flex' : 'none';
  });
}
function generatePlaceList() {
  const container = document.getElementById('placeList');
  const sites = [...new Set(allExhibitions.map(item => item.site))].sort();
  container.innerHTML = sites.map((site, i) => `
    <div class="place-item" style="cursor:pointer;" onclick="togglePlaceByIdx(${i})">
      <input type="checkbox" data-site-idx="${i}" onclick="event.stopPropagation();togglePlaceByIdx(${i})">
      <span>${sanitizeHTML(site)}</span>
    </div>
  `).join('');
  container._sites = sites;
}

function togglePlaceByIdx(i) {
  const container = document.getElementById('placeList');
  const site = container._sites[i];
  const cb = container.querySelector(`input[data-site-idx="${i}"]`);
  if (selectedPlaces.has(site)) { selectedPlaces.delete(site); cb.checked = false; }
  else { selectedPlaces.add(site); cb.checked = true; }
  filterData();
}
function resetPlaces() {
  selectedPlaces.clear();
  document.querySelectorAll('#placeList input[type=checkbox]').forEach(cb => cb.checked = false);
  filterData();
}
function resetAll() {
  document.getElementById('keywordSearch').value = '';
  vText.value = '';
  vPicker.value = '';
  resetPlaces();
}
function togglePlace(site) {
  if (selectedPlaces.has(site)) selectedPlaces.delete(site);
  else selectedPlaces.add(site);
  filterData();
}
function applyVisitFilter() { filterData(); }
function filterData() {
  const visitDate = vText.value.replace(/\./g, '');
  const keyword = document.getElementById('keywordSearch').value.toLowerCase().trim();
  displayData = allExhibitions.filter(item => {
    const isPlaceMatch = selectedPlaces.size === 0 || selectedPlaces.has(item.site);
    const isDateMatch = !visitDate || (item.startDate <= visitDate && item.endDate >= visitDate);
    const isKeywordMatch = !keyword || [item.title, item.site, item.description].some(f => f?.toLowerCase().includes(keyword));
    return isPlaceMatch && isDateMatch && isKeywordMatch;
  });
  displayData.sort((a, b) => {
    const score = (item) => {
      if (item.title?.toLowerCase().includes(keyword)) return 0;
      if (item.description?.toLowerCase().includes(keyword)) return 1;
      if (item.site?.toLowerCase().includes(keyword)) return 2;
      return 3;
    };
    return score(a) - score(b);
  });
  renderPage(1);
}
function renderPage(page) {
  currentPage = page;
  const grid = document.getElementById('cardGrid');
  const start = (page - 1) * DISPLAY_COUNT;
  const pageData = displayData.slice(start, start + DISPLAY_COUNT);
  grid.innerHTML = pageData.map((item, idx) => `
    <div class="card">
      <img src="${item.img}" class="card-img" onclick="openModalByIdx(${start + idx})" onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'">
      <div class="card-body">
        <span class="card-tag ${item.statusClass}">${
  item.statusClass === 'tag-ongoing'
    ? `전시 중 / D-${Math.ceil((new Date(item.endDate.replace(/(\d{4})(\d{2})(\d{2})/, '$1-$2-$3')) - new Date()) / 86400000)}`
    : item.statusClass === 'tag-upcoming'
    ? `전시 예정 / ${Math.ceil((new Date(item.startDate.replace(/(\d{4})(\d{2})(\d{2})/, '$1-$2-$3')) - new Date()) / 86400000)}일 후 시작`
    : item.status
}</span>
        <div class="card-title" onclick="openModalByIdx(${start + idx})">${sanitizeHTML(item.title)}</div>
        <div class="card-info"><span class="gray-icon">📅</span> ${item.period}</div>
        <div class="card-info"><span>📍</span> <a href="${getNaverMapLink(item.site)}" target="_blank" class="map-link">${sanitizeHTML(item.site)}</a></div>
      </div>
    </div>
  `).join('');
  updatePagination();
}
function openModalByIdx(idx) {
  const item = displayData[idx];
  document.getElementById('modalTitle').innerText = item.title;
  document.getElementById('modalImg').src = item.img || '';
  document.getElementById('modalPeriod').innerHTML = `<span class="gray-icon">📅</span> ${item.period}`;
  document.getElementById('modalSite').innerHTML = `<a href="${getNaverMapLink(item.site)}" target="_blank" class="map-link">${item.site}</a>`;
  document.getElementById('modalCharge').innerText = item.charge || '정보 없음';
  document.getElementById('modalDesc').innerHTML = item.description || '내용 없음';
  document.getElementById('modalUrl').href = item.url || '#';
  document.getElementById('modalContent').scrollTop = 0;
  document.getElementById('modalOverlay').style.display = 'flex';
}
function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
function updatePagination() {
  const container = document.getElementById('pagination');
  const totalPages = Math.ceil(displayData.length / DISPLAY_COUNT);
  if (totalPages <= 1) { container.innerHTML = ''; return; }

  const makeBtn = (p) =>
    `<button class="page-btn ${p === currentPage ? 'active' : ''}" onclick="renderPage(${p})">${p}</button>`;
  const makeDot = () => `<span style="color:var(--text-muted);padding:0 4px">…</span>`;

  let html = '';
  html += `<button class="page-btn" onclick="renderPage(${Math.max(1, currentPage - 1)})">◀</button>`;

  if (currentPage <= 3) {
    // 앞쪽: 1,2,3,...,last
    [1, 2, 3].forEach(p => { if (p <= totalPages) html += makeBtn(p); });
    if (totalPages > 4) html += makeDot();
    if (totalPages > 3) html += makeBtn(totalPages);
  } else {
    // 중간: 1,2,3,...,current,...,last
    [1, 2, 3].forEach(p => html += makeBtn(p));
    html += makeDot();
    html += makeBtn(currentPage);
    if (currentPage < totalPages) { html += makeDot(); html += makeBtn(totalPages); }
  }

  html += `<button class="page-btn" onclick="renderPage(${Math.min(totalPages, currentPage + 1)})">▶</button>`;
  container.innerHTML = html;
}

async function loadData() {
  const loadStatus = document.getElementById('loadInfo');
  try {
    loadStatus.innerText = '데이터 로드 중...';
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();

    if (!json.items || json.items.length === 0) {
      loadStatus.innerText = '데이터 준비 중 — GitHub Actions가 오늘 밤 처음 실행됩니다';
      return;
    }

    // 오늘 날짜 기준으로 종료된 전시 재필터 (JSON은 갱신 시점 기준이므로)
    allExhibitions = json.items.filter(item => item.endDate >= TODAY);
    displayData = allExhibitions;
    generatePlaceList();
    renderPage(1);

    const updatedAt = json.updatedAt
      ? new Date(json.updatedAt).toLocaleString('ko-KR', { timeZone: 'Asia/Seoul' })
      : '알 수 없음';
    loadStatus.innerText = `총 ${allExhibitions.length}건 | 마지막 갱신: ${updatedAt}`;
  } catch (e) {
    console.error('loadData 실패:', e);
    loadStatus.innerText = `데이터 로드 실패: ${e.message}`;
  }
}

loadData();
</script>
</body>
</html>
