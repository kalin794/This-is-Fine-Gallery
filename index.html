<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>전시 안내 아카이브</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ===== Header ===== -->
<header>
  <div class="header-inner">
    <div class="logo">전시 안내</div>
    <div class="filter-group">
      <input type="text" id="keywordSearch" class="date-text" placeholder="제목/장소/내용 검색"
             style="width:160px;background:var(--bg-card);border:1px solid var(--border);border-radius:4px;padding:7px 10px;"
             onkeyup="if(event.keyCode===13)applyVisitFilter()">
      <div class="date-input-wrap">
        <input type="text" id="visitDateText" class="date-text" placeholder="방문일 yyyy.mm.dd" maxlength="10"
               onkeyup="if(event.keyCode===13)applyVisitFilter()">
        <span class="gray-icon">📅</span>
        <input type="date" id="visitDatePicker" class="date-picker">
      </div>
      <button class="filter-btn today-btn" onclick="setToday()">Today</button>
      <button class="filter-btn" onclick="applyVisitFilter()">전시 찾기</button>
      <button class="filter-btn today-btn" onclick="resetAll()">초기화</button>
    </div>
  </div>
</header>

<!-- ===== Status Bar ===== -->
<div class="status-bar">
  <span id="loadInfo">데이터 연결 중...</span>
  <span id="timerInfo"></span>
</div>

<!-- ===== Page Body ===== -->
<div class="page-body">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:15px;">
      <div class="sidebar-title" style="margin-bottom:0">Place Filter</div>
      <button onclick="resetPlaces()"
              style="background:none;border:1px solid var(--border);color:var(--text-muted);font-size:0.7rem;padding:2px 8px;border-radius:3px;cursor:pointer;">
        Reset
      </button>
    </div>
    <div class="place-search-wrap">
      <input type="text" id="placeSearch" class="place-search-input" placeholder="장소명 검색..." oninput="filterPlaceList()">
    </div>
    <div id="placeList"></div>
  </aside>

  <!-- Main Content -->
  <main class="content">
    <div class="card-grid" id="cardGrid"></div>
    <div id="pagination" class="pagination"></div>
  </main>

</div>

<!-- ===== Modal ===== -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this) closeModal()">
  <div class="modal-content" id="modalContent">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-inner">
      <div id="modalTitle" class="modal-title"></div>
      <img id="modalImg" class="modal-img" src="" alt="">
      <div class="modal-grid">
        <div class="info-item">
          <div class="info-label">Period</div>
          <div id="modalPeriod" class="info-value"></div>
        </div>
        <div class="info-item">
          <div class="info-label">Place</div>
          <div id="modalSite" class="info-value"></div>
        </div>
        <div class="info-item">
          <div class="info-label">Admission</div>
          <div id="modalCharge" class="info-value"></div>
        </div>
      </div>
      <div id="modalDesc" class="modal-desc"></div>
      <a id="modalUrl" class="modal-link" href="#" target="_blank">사이트 방문 →</a>
    </div>
  </div>
</div>

<!-- ===== Script ===== -->
<script src="app.js"></script>

</body>
</html>
